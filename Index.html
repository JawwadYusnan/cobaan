<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>اختبار تفاعلي</title>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
  };
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400&display=swap');
:root{ --bg:#002b36; --panel:#073642; --text:#eee8d5; --muted:#93a1a1; --primary:#268bd2; --primary2:#2aa198; --border:color-mix(in srgb, var(--text) 18%, transparent); --option-bg:color-mix(in srgb, var(--panel) 88%, var(--primary) 12%); --option-hover:color-mix(in srgb, var(--panel) 80%, var(--primary) 20%); --option-active:color-mix(in srgb, var(--panel) 72%, var(--primary) 28%); --radius:16px; --app-font:'Scheherazade New', Scheherazade, serif; }
body{ margin:0; font-family:var(--app-font); background:var(--bg); color:var(--text); min-height:100vh; display:flex; justify-content:center; padding:20px; box-sizing:border-box; }
button,input,table,th,td,label,h1,h2,h3,p,div{ font-family:var(--app-font); }
.card{ background:var(--panel); width:100%; max-width:600px; border-radius:var(--radius); padding:24px; box-shadow:0 10px 30px rgba(0,0,0,0.3); border:1px solid var(--border); }
h1{ margin:0 0 10px; font-size:22px; text-align:center; } .desc{ color:var(--muted); font-size:13px; margin-bottom:20px; text-align:center; line-height:1.5; }
.quizLogoWrap{ width:162px; height:162px; border-radius:50%; overflow:hidden; margin:4px auto 18px; border:1px solid var(--border); background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; }
.quizLogo{ width:100%; height:100%; object-fit:cover; display:block; }
.loginIntro{ text-align:center; }
.loginForm{ width:100%; max-width:420px; margin:0 auto; }
.loginForm label{ text-align:left; }
.loginForm input{ text-align:left; }
.reviewBox{ margin-top:20px; border-top:1px solid var(--border); padding-top:18px; }
.reviewItem{ border:1px solid var(--border); border-radius:12px; padding:14px; margin-top:12px; background:color-mix(in srgb, var(--panel) 90%, var(--primary) 10%); }
.badge{ display:inline-block; padding:4px 8px; border-radius:999px; font-size:11px; font-weight:800; margin-bottom:8px; }
.badge.ok{ background:rgba(34,197,94,.16); color:var(--primary2); }
.badge.no{ background:rgba(239,68,68,.16); color:#ef4444; }
.reviewMeta{ font-size:13px; line-height:1.55; color:var(--text); }
.reviewMeta b{ color:var(--muted); }
label{ font-size:10px; text-transform:uppercase; font-weight:bold; color:var(--muted); margin-bottom:4px; display:block; }
.loginForm label{ font-size:12px; }
.loginForm input{ padding:10px 12px; }
input{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:color-mix(in srgb, var(--panel) 92%, var(--text) 8%); color:var(--text); margin-bottom:15px; box-sizing:border-box; outline:none; }
.loginForm input{ padding:10px 12px; }
.timerBox{ width:max-content; min-width:118px; margin:0 auto 14px; padding:8px 16px; border-radius:999px; background:linear-gradient(135deg, color-mix(in srgb, var(--primary) 18%, var(--panel) 82%), color-mix(in srgb, var(--primary2) 16%, var(--panel) 84%)); border:1px solid color-mix(in srgb, var(--primary) 42%, var(--border)); color:var(--primary2); font-size:17px; font-weight:800; letter-spacing:.04em; text-align:center; box-shadow:0 8px 22px rgba(0,0,0,.16); }
.timeEndNotice{ margin:0 0 16px; padding:12px 14px; border-radius:14px; background:color-mix(in srgb, #ef4444 12%, var(--panel) 88%); border:1px solid color-mix(in srgb, #ef4444 46%, var(--border)); color:var(--text); text-align:center; font-size:15px; font-weight:800; }
.btn{ background:var(--primary); color:#fff; border:none; padding:12px 20px; border-radius:10px; cursor:pointer; font-weight:800; width:100%; transition:0.2s; box-shadow:0 8px 18px rgba(0,0,0,.22); }
.btn:hover{ filter:brightness(1.1); }
.btn-back{ background:linear-gradient(135deg, var(--primary), var(--primary2)); color:#fff; border:1px solid rgba(255,255,255,.35); box-shadow:0 0 0 3px rgba(255,255,255,.10), 0 8px 22px rgba(0,0,0,.25); }
.btn-back:hover{ filter:brightness(1.18); box-shadow:0 0 0 4px rgba(255,255,255,.14), 0 10px 26px rgba(0,0,0,.30); }
.opt{ display:block; padding:14px; border:1px solid color-mix(in srgb, var(--primary) 35%, var(--border)); border-radius:10px; margin-bottom:10px; cursor:pointer; transition:0.2s; background:var(--option-bg); color:var(--text); font-weight:600; }
.opt:hover{ background:var(--option-hover); border-color:color-mix(in srgb, var(--primary) 55%, var(--border)); } .opt.active{ border-color:var(--primary); background:var(--option-active); box-shadow:0 0 0 3px color-mix(in srgb, var(--primary) 24%, transparent); }
.bar{ height:6px; background:rgba(255,255,255,0.05); border-radius:3px; margin-bottom:20px; overflow:hidden; }
.fill{ height:100%; background:var(--primary); transition:width 0.3s; }
table{ width:100%; border-collapse:collapse; margin-top:15px; font-size:12px; }
th, td{ text-align:left; padding:8px; border-bottom:1px solid var(--border); }
@media (min-width: 901px){ body{ overflow:hidden; } .card{ max-height:calc(100vh - 40px); overflow:auto; } }
.loginForm{direction:rtl;} .loginForm label,.loginForm input{text-align:right; direction:rtl;} .loginForm label{font-size:14px;} th, td{text-align:right;} b,strong,h1,h2,h3,label,.btn,.opt,.badge,.reviewMeta b{font-weight:400!important;} h2{color:var(--primary2);} .opt{color:var(--text);}
</style>
</head>

<script>
const DATA = {"title":"اختبار تفاعلي","desc":"أجب عن جميع الأسئلة ثم راجع التغذية الراجعة في النهاية.","lang":"ar","randQ":true,"randA":true,"saveData":true,"classLbl":"الفصل","sheetUrl":"https://script.google.com/macros/s/AKfycbzEMqViagt6NvCOWxpwF5RWs5tSPRoIpcSRXC0nl1TsiVERIlcVIwLQrdhck1Da0Ju3sQ/exec","logoUrl":"","timerMinutes":0,"hasExplanation":true,"questions":[{"q":"ما هي النسبة التقريبية التي تشكلها الإشارات غير اللفظية من مضمون الرسالة التواصلية في الاجتماعات الرسمية؟","choices":["20%","50%","80%","95%"],"answerIndex":2,"explain":"فكر في الرقم الذي يتجاوز ثلاثة أرباع إجمالي محتوى الرسالة.","rationales":["هذه النسبة تمثل الجزء اللفظي أو المنطوق غالباً، بينما تسيطر لغة الجسد على الجزء الأكبر من التواصل.","على الرغم من أن نصف الرسالة قد يبدو كبيراً، إلا أن الدراسات تشير إلى تأثير أعمق بكثير للغة الجسد في المواقف الرسمية.","تشير المصادر إلى أن الغالبية العظمى من فهم الرسالة في الاجتماعات تعتمد على الإشارات غير اللفظية بدلاً من الكلمات وحدها.","هذه النسبة مبالغ فيها، حيث تظل الكلمات تلعب دوراً ضرورياً وإن كان ثانوياً مقارنة بلغة الجسد."]},{"q":"يؤدي التناقض بين الكلمات المنطوقة ولغة الجسد أثناء التفاوض إلى:","choices":["تعزيز القدرة على المناورة","التوتر وسوء الفهم","زيادة سرعة الوصول لاتفاق","إظهار مهارات قيادية عالية"],"answerIndex":1,"explain":"فكر في النتيجة السلبية المترتبة على إرسال رسائل متضاربة للطرف الآخر.","rationales":["التناقض لا يساعد في التفاوض بل يخلق حالة من الارتباك تضعف موقف المفاوض.","عندما لا تتوافق الكلمات مع تعبيرات الجسد، يشعر الطرف الآخر بعدم الارتياح مما يؤدي إلى تعقيد الحوار.","على العكس تماماً، فعدم الوضوح الناتج عن التناقض يعيق سير العملية التفاوضية.","القادة الناجحون يحرصون على تطابق إشاراتهم لضمان المصداقية وليس العكس."]},{"q":"كيف تساهم وضعية 'إرجاع الكتفين للخلف' في دعم موقف المفاوض؟","choices":["تظهر الهيمنة والعدوانية","تساعد في إخفاء التوتر الداخلي فقط","تجسد الثقة وترسل رسائل طمأنينة","تُستخدم فقط عند البدء في تقديم التنازلات"],"answerIndex":2,"explain":"اربط بين استقامة الظهر والشعور بالثقة بالنفس.","rationales":["الهدف من هذه الوضعية هو بث الطمأنينة وليس تهديد الطرف الآخر.","تتعدى هذه الوضعية مجرد الإخفاء، فهي ترسل رسالة إيجابية نشطة للمفاوض الآخر.","الوقوف أو الجلوس بشكل منفتح ومستقيم يعزز من مصداقية المفاوض ويشعره بالتمكن.","هذه الوضعية هي استراتيجية عامة لتعزيز الثقة في كافة مراحل التفاوض."]},{"q":"أي من الإيماءات التالية تعزز الشفافية والصدق وفقاً لاستراتيجية 'الوضعية المفتوحة'؟","choices":["وضع اليدين في الجيوب","إيماءات 'مفتوحة اليدين' مثل مد الكفين","الإمساك بقلم وتحريكه باستمرار","تشابك الأصابع بإحكام"],"answerIndex":1,"explain":"ابحث عن الحركة التي تجعل كفوف اليد مرئية بوضوح للطرف الآخر.","rationales":["إخفاء اليدين قد يوحي بالغموض أو عدم الرغبة في الكشف عن المعلومات.","رفع راحة اليد للخارج أو مد الكفين يشير نفسياً إلى الانفتاح وعدم وجود أسرار مخفية.","هذا السلوك يندرج تحت التململ الذي قد يعرقل سير الاجتماع ويوحي بالقلق.","هذه الحركة قد تفسر على أنها نوع من الانغلاق أو التوتر، عكس الإيماءات المفتوحة."]},{"q":"ما الهدف من استخدام 'الإيماء بالرأس' و 'الميل البسيط للأمام' أثناء التفاوض؟","choices":["تفعيل الإصغاء المتفاعل وإظهار الاهتمام","الضغط على الطرف الآخر لإنهاء حديثه","إخفاء عدم فهم النقاط التقنية","فرض سيطرة جسدية على طاولة التفاوض"],"answerIndex":0,"explain":"فكر في كيفية إظهار أنك مستمع جيد ومهتم بما يقال.","rationales":["هذه الحركات تشجع الطرف الآخر على الاسترسال في حديثه وتُشعره بأن مصالحه محل تقدير.","هذه الإشارات تعمل كمحفز للاستمرار في الحديث وليس وسيلة للمقاطعة.","الإيماء يهدف لبناء تقارب وتفاعل وجداني وليس لتغطية نقص المعرفة.","الميل للأمام هو حركة تقارب تهدف لبناء جسور التواصل وليس للسيطرة."]},{"q":"ما هي الممارسة الصحيحة لتحقيق 'تواصل بصري متوازن'؟","choices":["التحديق المستمر والمطول في عين الخصم","تجنب النظر المباشر تماماً لعدم الإحراج","النظر المباشر واللطيف مع تركيز واعي","النظر المتكرر للساعة أو الموبايل أثناء الحديث"],"answerIndex":2,"explain":"ابحث عن الحل الوسط الذي يجمع بين الاهتمام والراحة النفسية للآخر.","rationales":["التحديق لفترات طويلة قد يسبب الإزعاج والتوتر للطرف الآخر.","عدم النظر قد يُفسر كدليل على ضعف الثقة أو عدم الاهتمام بالموضوع.","هذا التوازن يشعر الآخرين بتركيزك الجاد دون أن يسبب لهم أي ضيق أو إزعاج.","تشتيت النظر نحو أشياء خارجية يعتبر من الإشارات الدفاعية أو المشتتة السلبية."]},{"q":"إذا لاحظت أن الطرف الآخر بدأ بالنظر الجانبي أو التململ، تنصح الاستراتيجية بـ:","choices":["تجاهل هذه العلامات والاستمرار في العرض","إعادة تركيز النقاش أو طرح استراحة قصيرة","رفع نبرة الصوت لجذب انتباهه مجدداً","إنهاء الاجتماع فوراً وإلغاء الصفقة"],"answerIndex":1,"explain":"فكر في وسيلة مرنة لإعادة الحيوية والنشاط إلى جلسة التفاوض.","rationales":["التجاهل قد يؤدي لفقدان الطرف الآخر تماماً وفشل العملية التفاوضية.","التدخل السريع عند ملاحظة الملل يساعد في استعادة فعالية التفاوض والحفاظ على مسار المصالح المشتركة.","رفع الصوت قد يُفهم كعدوانية بدلاً من كونه وسيلة لإعادة التركيز.","الملل إشارة لضرورة تغيير الأسلوب وليس بالضرورة لإنهاء التفاوض كلياً."]},{"q":"تعتبر حركة 'تشابك الذراعين أمام الصدر' من الإشارات التي يجب تجنبها لأنها:","choices":["توحي بالرفض أو الانغلاق","تدل على شدة التركيز في التفاصيل","تعتبر وضعية مريحة جداً أثناء الجلوس الطويل","تستخدم حصراً لإظهار القوة المالية"],"answerIndex":0,"explain":"فكر في الانطباع الذي تتركه الحواجز الجسدية بين الناس.","rationales":["هذه الوضعية تخلق حاجزاً نفسياً وتزيد من هواجس الطرف الآخر تجاه نواياك.","على العكس، فهي غالباً ما تترجم كموقف دفاعي أو غير متقبل للأفكار المطروحة.","حتى لو كانت مريحة جسدياً، فإن تأثيرها السلبي على رسالة التفاوض يجعلها غير مرغوبة.","لا توجد علاقة بين هذه الحركة والقوة المادية؛ بل هي تعبير عن حالة نفسية دفاعية."]},{"q":"أي من السلوكيات التالية يندرج تحت 'الإشارات الدفاعية' التي تعرقل الاجتماعات؟","choices":["الميل البسيط للأمام","التململ والعبث بالأقلام أو الموبايل","الجلوس بظهر مستقيم وأكتاف منبسطة","استخدام إيماءات اليد المفتوحة"],"answerIndex":1,"explain":"ابحث عن السلوك الذي يظهر انشغال المفاوض بأشياء ثانوية.","rationales":["هذا سلوك إيجابي يدل على الاهتمام والتقارب وليس الدفاع.","تعكس هذه الحركات تشتت الانتباه وعدم الجدية، مما يقلل من جودة التفاعل بين الطرفين.","هذه وضعية انفتاح وثقة تعزز الشفافية والمصداقية.","هذه الإيماءات هي أداة لبناء الصدق والوضوح في الحوار."]},{"q":"ما هي الفائدة الأساسية من استراتيجية 'اليقظة والملاحظة' تجاه لغة جسد الطرف الآخر؟","choices":["القدرة على توقع التنازلات المالية فقط","ضمان بقاء الطرفين في مسار تحقيق المصالح المشتركة","إيجاد نقاط ضعف شخصية لاستغلالها","تقليل زمن الاجتماع إلى الحد الأدنى"],"answerIndex":1,"explain":"فكر في الغاية النهائية من إدارة عملية التفاوض بنجاح.","rationales":["تتجاوز الملاحظة الجوانب المالية لتشمل الحالة النفسية ومدى استجابة الطرف الآخر للحوار.","من خلال ملاحظة إشارات عدم الارتياح، يمكن تعديل مسار النقاش للحفاظ على إنتاجية التفاوض.","الهدف المذكور في المصدر هو تحقيق مصلحة الطرفين وليس الاستغلال السلبي.","الهدف هو الفعالية وتحقيق الأهداف، وليس مجرد تقليل الوقت."]}]}; 
const UI = {"name":"الاسم الكامل","class":"الفصل","start":"ابدأ الاختبار","next":"التالي","back":"رجوع","finish":"إنهاء","retake":"إعادة الاختبار","rank":"أفضل 10 نتائج","saving":"جارٍ حفظ البيانات...","result":"النتيجة","q":"س","tableName":"الاسم","tableClass":"الفصل","percent":"%","alertInfo":"يرجى إدخال المعلومات.","alertChoose":"يرجى اختيار إجابة.","review":"مراجعة الإجابات","questionLabel":"السؤال","answerLabel":"الإجابة","explanationLabel":"الشرح","correct":"صحيح","incorrect":"غير صحيح","feedbackCorrect":"الإجابة صحيحة، لا توجد ملاحظات.","feedbackWrong":"الإجابة لا توافق الفكرة الأساسية.","noRefNote":"لم يتم العثور على شرح في ملف الأسئلة المرفوع.","timeEnd":"انتهى الوقت"};
let state = { mode:'login', idx:0, ans:[], name:'', class:'', qs:[], loading:false, ranking:[], endTime:0, remaining:0, timeEnded:false };
let timerInterval = null;
function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function formatTime(ms){ const total = Math.max(0, Math.ceil(ms/1000)); const m = Math.floor(total/60); const s = total % 60; return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'); }
function startTimer(){ if(timerInterval) clearInterval(timerInterval); if(!DATA.timerMinutes) return; state.endTime = Date.now() + DATA.timerMinutes * 60000; timerInterval = setInterval(() => { state.remaining = state.endTime - Date.now(); if(state.remaining <= 0){ clearInterval(timerInterval); timerInterval = null; state.timeEnded = true; finish(); } else if(state.mode === 'quiz') { const el = document.getElementById('timerBox'); if(el) el.textContent = formatTime(state.remaining); } }, 1000); }
function timerHtml(){ return DATA.timerMinutes && state.mode === 'quiz' ? '<div class="timerBox" id="timerBox">' + formatTime(state.endTime - Date.now()) + '</div>' : ''; }
function buildReview(){
  return '<div class="reviewBox"><h3 style="text-align:center; margin:0 0 12px;">' + UI.review + '</h3>' +
    state.qs.map((q,i) => {
      const picked = state.ans[i];
      const ok = picked === q.answerIndex;
      const userAns = picked === null || picked === undefined ? '-' : q.choices[picked];
      const selectedRationale = q.rationales && picked !== null && picked !== undefined ? q.rationales[picked] : "";
      const correctRationale = q.rationales ? q.rationales[q.answerIndex] : "";
      const fb = selectedRationale || correctRationale || q.explain || (ok ? UI.feedbackCorrect : UI.feedbackWrong + " " + UI.noRefNote);
      return '<div class="reviewItem">' +
        '<span class="badge ' + (ok ? 'ok' : 'no') + '">' + (ok ? UI.correct : UI.incorrect) + '</span>' +
        '<div class="reviewMeta"><b>' + UI.questionLabel + ':</b> ' + esc(q.q) + '</div>' +
        '<div class="reviewMeta"><b>' + UI.answerLabel + ':</b> ' + esc(userAns) + '</div>' +
        '<div class="reviewMeta"><b>' + UI.explanationLabel + ':</b> ' + esc(fb) + '</div>' +
      '</div>';
    }).join('') + '</div>';
}

function render(){
  const app = document.getElementById('app');
  if(state.mode==='login'){
    const logoHtml = DATA.logoUrl ? '<div class="quizLogoWrap"><img class="quizLogo" src="' + esc(DATA.logoUrl) + '" alt="Logo"></div>' : '';
    app.innerHTML = '<div class="loginIntro">' + logoHtml + '<h1>' + DATA.title + '</h1><p class="desc">' + DATA.desc + '</p></div>' +
      '<div class="loginForm"><label>' + UI.name + '</label><input type="text" id="u_name" value="' + esc(state.name) + '">' +
      '<label>' + UI.class + '</label><input type="text" id="u_class" value="' + esc(state.class) + '">' +
      '<button class="btn" onclick="start()">' + UI.start + '</button></div>';
  } else if(state.mode==='quiz'){
    const q = state.qs[state.idx];
    const backBtn = state.idx > 0 ? '<button class="btn btn-back" style="margin-top:10px;" onclick="back()">' + UI.back + '</button>' : '';
    const finishBtn = state.idx === state.qs.length - 1 ? '<button class="btn" style="margin-top:10px;" onclick="next()">' + UI.finish + '</button>' : '';
    app.innerHTML = timerHtml() + '<div class="bar"><div class="fill" style="width:' + ((state.idx)/state.qs.length)*100 + '%"></div></div>' +
      '<div style="font-size:11px; color:var(--muted); margin-bottom:10px;">' + UI.q + ' ' + (state.idx+1) + ' / ' + state.qs.length + '</div>' +
      '<h2 style="font-size:17px; margin-bottom:20px;">' + q.q + '</h2>' +
      q.choices.map((c,i) => '<div class="opt ' + (state.ans[state.idx]===i?'active':'') + '" onclick="setAns(' + i + ')">' + c + '</div>').join('') +
      finishBtn + backBtn;
  } else if(state.mode==='result'){
    let score = state.ans.reduce((acc, a, i) => acc + (a === state.qs[i].answerIndex ? 1 : 0), 0);
    let pct = Math.round((score/state.qs.length)*100);
    let html = '<h1>' + UI.result + '</h1>' + (state.timeEnded ? '<div class="timeEndNotice">' + UI.timeEnd + '</div>' : '') + '<div style="font-size:48px; font-weight:900; color:var(--primary2);">' + pct + '% (' + score + '/' + state.qs.length + ')</div>';
    html += buildReview();
    if(DATA.saveData){
      html += '<div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;"><h3 style="text-align:center;">' + UI.rank + '</h3>';
      if(state.loading) html += '<p>' + UI.saving + '</p>';
      else if(state.ranking.length > 0) {
        html += '<table><tr><th>#</th><th>' + UI.tableName + '</th><th>' + UI.tableClass + '</th><th>' + UI.percent + '</th></tr>' + 
          state.ranking.map((r,i) => '<tr><td>' + (i+1) + '</td><td>' + esc(r.name) + '</td><td>' + esc(r.class) + '</td><td>' + esc(r.percent) + '</td></tr>').join('') + '</table>';
      }
      html += '</div>';
    }
    html += '<button class="btn" style="margin-top:20px;" onclick="location.reload()">' + UI.retake + '</button>';
    app.innerHTML = html;
  }
  if (window.MathJax && window.MathJax.typeset) window.MathJax.typeset();
}
function start(){
  state.name = document.getElementById('u_name').value.trim(); 
  state.class = document.getElementById('u_class').value.trim();
  if(!state.name || !state.class) return alert(UI.alertInfo);
  state.qs = JSON.parse(JSON.stringify(DATA.questions));
  if(DATA.randQ) state.qs.sort(() => Math.random()-0.5);
  if(DATA.randA) state.qs.forEach(q => {
    const originalCorrect = q.choices[q.answerIndex];
    const rationales = Array.isArray(q.rationales) ? q.rationales : [];
    const pairs = q.choices.map((choice, idx) => ({ choice, rationale: rationales[idx] || "" }));
    pairs.sort(() => Math.random()-0.5);
    q.choices = pairs.map(p => p.choice);
    q.rationales = pairs.map(p => p.rationale);
    q.answerIndex = q.choices.indexOf(originalCorrect);
  });
  state.ans = new Array(state.qs.length).fill(null);
  state.timeEnded = false;
  state.mode = 'quiz'; startTimer(); render();
}
function setAns(i){ state.ans[state.idx] = i; if(state.idx < state.qs.length - 1){ state.idx++; } render(); }
function back(){ if(state.idx > 0){ state.idx--; render(); } }
function next(){
  if(state.ans[state.idx]===null) return alert(UI.alertChoose);
  if(state.idx < state.qs.length - 1){ state.idx++; render(); }
  else { finish(); }
}
async function finish(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  state.mode = 'result'; render();
  if(DATA.saveData && DATA.sheetUrl){
    state.loading = true; render();
    let score = state.ans.reduce((acc, a, i) => acc + (a === state.qs[i].answerIndex ? 1 : 0), 0);
    let pct = Math.round((score/state.qs.length)*100);
    try {
      await fetch(DATA.sheetUrl, { method:'POST', body: JSON.stringify({name:state.name, class:state.class, score:score, percent:pct}), mode:'no-cors' });
      setTimeout(async () => {
        try { const res = await fetch(DATA.sheetUrl); state.ranking = await res.json(); render(); } catch(e){}
        state.loading = false; render();
      }, 1500);
    } catch(e){ state.loading = false; render(); }
  }
}
render();
</script>
</body></html>
